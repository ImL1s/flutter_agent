name: ai_flutter_agent
description: A Flutter package that lets LLMs operate app UIs via the Semantics tree. Perceive → Plan → Execute → Verify loop with built-in safety features.
version: 0.1.1
homepage: https://github.com/ImL1s/flutter_agent
repository: https://github.com/ImL1s/flutter_agent
issue_tracker: https://github.com/ImL1s/flutter_agent/issues
topics:
  - ai
  - llm
  - semantics
  - accessibility
  - agent

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.0
  flutter_lints: ^5.0.0
